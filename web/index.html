<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myanmar HWR — Model Comparison</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 16px;
  }

  .header { text-align: center; margin-bottom: 16px; }
  .header h1 { font-size: 1.4rem; font-weight: 700; color: #f1f5f9; }
  .header .sub { font-size: 0.8rem; color: #64748b; margin-top: 4px; }

  .top-row {
    display: flex; gap: 16px; max-width: 1200px;
    margin: 0 auto 16px; flex-wrap: wrap; justify-content: center;
  }

  .panel {
    background: #1e293b; border: 1px solid #334155;
    border-radius: 12px; padding: 14px;
  }

  .panel-title {
    font-size: 0.78rem; font-weight: 700; color: #64748b;
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px;
  }

  /* --- Canvas --- */
  .draw-panel { width: 400px; }

  canvas {
    width: 100%; height: 260px; background: #0f172a;
    border: 2px solid #334155; border-radius: 10px;
    cursor: crosshair; touch-action: none; display: block;
  }

  .canvas-footer {
    display: flex; justify-content: space-between;
    align-items: center; margin-top: 8px;
  }

  .stroke-info { font-size: 0.75rem; color: #475569; }
  .buttons { display: flex; gap: 5px; }

  button {
    padding: 7px 14px; border: none; border-radius: 7px;
    font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }

  .btn-go { background: #3b82f6; color: white; padding: 7px 20px; }
  .btn-go:hover { background: #2563eb; }
  .btn-go:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
  .btn-sec { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
  .btn-sec:hover { background: #334155; }

  .status { text-align: center; font-size: 0.75rem; margin-top: 6px; min-height: 16px; }
  .status.ok { color: #4ade80; }
  .status.err { color: #f87171; }
  .status.wait { color: #fbbf24; }

  /* --- Reference --- */
  .ref-panel { width: 260px; max-height: 380px; display: flex; flex-direction: column; }

  .search-box {
    width: 100%; padding: 7px 10px; border: 1px solid #334155; border-radius: 7px;
    background: #0f172a; color: #e2e8f0; font-size: 0.82rem; outline: none; margin-bottom: 8px;
  }
  .search-box:focus { border-color: #3b82f6; }
  .search-box::placeholder { color: #475569; }

  .ref-count { font-size: 0.7rem; color: #475569; margin-bottom: 6px; }

  .syl-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px;
    overflow-y: auto; flex: 1;
  }
  .syl-grid::-webkit-scrollbar { width: 4px; }
  .syl-grid::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

  .syl-cell {
    display: flex; flex-direction: column; align-items: center;
    padding: 4px 2px; border-radius: 5px; background: #0f172a;
  }
  .syl-cell:hover { background: #1a2744; }
  .syl-char { font-size: 1rem; color: #e2e8f0; }
  .syl-id { font-size: 0.55rem; color: #475569; }

  /* --- Results Grid --- */
  .results-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px; max-width: 1200px; margin: 0 auto;
  }

  .model-card {
    background: #1e293b; border: 1px solid #334155;
    border-radius: 12px; padding: 14px; transition: border-color 0.2s;
  }

  .model-card.best { border-color: #22c55e; }

  .mc-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }

  .mc-name { font-size: 0.9rem; font-weight: 700; }
  .mc-name.stroke { color: #60a5fa; }
  .mc-name.image { color: #4ade80; }

  .mc-badge {
    font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 4px;
  }
  .mc-badge.stroke { background: #1e3a5f; color: #60a5fa; }
  .mc-badge.image { background: #14532d; color: #4ade80; }

  .mc-meta { font-size: 0.68rem; color: #475569; margin-bottom: 10px; }

  .mc-top {
    text-align: center; padding: 12px 8px;
    background: #0f172a; border-radius: 8px; margin-bottom: 8px;
  }

  .mc-top-syl { font-size: 2.8rem; line-height: 1.1; color: #f1f5f9; }
  .mc-top-conf { font-size: 0.85rem; font-weight: 700; margin-top: 4px; }
  .mc-top-conf.stroke { color: #60a5fa; }
  .mc-top-conf.image { color: #4ade80; }
  .mc-top-class { font-size: 0.65rem; color: #475569; margin-top: 2px; }

  .mc-row {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 6px; border-radius: 5px; margin-bottom: 3px;
    background: #0f172a;
  }

  .mc-row-rank { font-size: 0.65rem; color: #475569; min-width: 14px; }
  .mc-row-syl { font-size: 1.1rem; min-width: 40px; text-align: center; }
  .mc-row-bar { flex: 1; height: 4px; background: #1e293b; border-radius: 2px; overflow: hidden; }
  .mc-row-fill { height: 100%; border-radius: 2px; }
  .mc-row-fill.stroke { background: #3b82f6; }
  .mc-row-fill.image { background: #22c55e; }
  .mc-row-conf { font-size: 0.65rem; color: #64748b; min-width: 36px; text-align: right; }

  .mc-footer { font-size: 0.65rem; color: #475569; text-align: right; margin-top: 6px; }

  .mc-empty { text-align: center; padding: 30px; color: #334155; font-size: 0.85rem; }

  .best-label {
    display: inline-block; font-size: 0.6rem; font-weight: 700;
    background: #14532d; color: #4ade80; padding: 1px 6px; border-radius: 4px;
    margin-left: 6px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Myanmar Handwriting Recognition</h1>
  <p class="sub">Draw once — compare all models side by side</p>
</div>

<div class="top-row">
  <div class="panel draw-panel">
    <div class="panel-title">Draw</div>
    <canvas id="canvas"></canvas>
    <div class="canvas-footer">
      <span class="stroke-info" id="info">Draw a syllable</span>
      <div class="buttons">
        <button class="btn-sec" onclick="undo()">↩ Undo</button>
        <button class="btn-sec" onclick="clearCanvas()">Clear</button>
        <button class="btn-go" id="goBtn" onclick="recognizeAll()" disabled>Compare All</button>
      </div>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="panel ref-panel">
    <div class="panel-title">Syllables</div>
    <input class="search-box" id="search" placeholder="Search..." oninput="filter()">
    <div class="ref-count" id="refCount"></div>
    <div class="syl-grid" id="sylGrid"></div>
  </div>
</div>

<div class="results-row" id="results">
  <div class="model-card"><div class="mc-empty">Draw a syllable and tap "Compare All"</div></div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let strokes = [], cur = [], drawing = false, allSyl = [];
const colors = ['#ef4444','#3b82f6','#22c55e','#f59e0b','#a855f7','#06b6d4'];

function resize() {
  const r = canvas.getBoundingClientRect();
  canvas.width = r.width * devicePixelRatio;
  canvas.height = r.height * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 3;
  redraw();
}
resize(); window.addEventListener('resize', resize);

function pos(e) {
  const r = canvas.getBoundingClientRect();
  if (e.touches) return {x: e.touches[0].clientX-r.left, y: e.touches[0].clientY-r.top};
  return {x: e.clientX-r.left, y: e.clientY-r.top};
}

canvas.addEventListener('mousedown', e => start(pos(e)));
canvas.addEventListener('mousemove', e => { if(drawing) move(pos(e)); });
canvas.addEventListener('mouseup', end);
canvas.addEventListener('mouseleave', end);
canvas.addEventListener('touchstart', e => { e.preventDefault(); start(pos(e)); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); move(pos(e)); });
canvas.addEventListener('touchend', e => { e.preventDefault(); end(); });

function start(p) {
  drawing = true; cur = [{x:p.x, y:p.y, t:performance.now()/1000}];
  ctx.strokeStyle = colors[strokes.length % colors.length];
  ctx.beginPath(); ctx.moveTo(p.x, p.y);
}
function move(p) {
  cur.push({x:p.x, y:p.y, t:performance.now()/1000});
  ctx.lineTo(p.x, p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x, p.y);
}
function end() {
  if (!drawing) return; drawing = false;
  if (cur.length > 1) { strokes.push([...cur]); upInfo(); goBtn.disabled = false; }
  cur = [];
}
function undo() {
  if (!strokes.length) return; strokes.pop(); redraw(); upInfo();
  if (!strokes.length) goBtn.disabled = true;
}
function clearCanvas() {
  strokes = []; cur = []; ctx.clearRect(0,0,canvas.width,canvas.height);
  goBtn.disabled = true; upInfo();
  document.getElementById('status').textContent = '';
  document.getElementById('results').innerHTML =
    '<div class="model-card"><div class="mc-empty">Draw a syllable and tap "Compare All"</div></div>';
}
function redraw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.lineCap='round'; ctx.lineJoin='round'; ctx.lineWidth=3;
  strokes.forEach((s,i) => {
    ctx.strokeStyle = colors[i%colors.length];
    ctx.beginPath(); ctx.moveTo(s[0].x, s[0].y);
    s.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
  });
}
function upInfo() {
  const pts = strokes.reduce((s,st) => s+st.length, 0);
  document.getElementById('info').textContent =
    strokes.length ? `${strokes.length} stroke${strokes.length>1?'s':''} · ${pts} pts` : 'Draw a syllable';
}

// ============================================================
// RECOGNIZE ALL
// ============================================================
async function recognizeAll() {
  if (!strokes.length) return;
  const st = document.getElementById('status');
  goBtn.disabled = true;
  st.textContent = 'Running all models...'; st.className = 'status wait';

  try {
    const res = await fetch('/predict_all', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({strokes})
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    showResults(data);
    const count = Object.keys(data).length;
    st.textContent = `Compared ${count} models`; st.className = 'status ok';
  } catch(e) {
    st.textContent = 'Error: '+e.message; st.className = 'status err';
  }
  goBtn.disabled = false;
}

function showResults(data) {
  const el = document.getElementById('results');

  // Find best model
  let bestName = '', bestConf = 0;
  for (const [name, r] of Object.entries(data)) {
    if (r.predictions.length && r.predictions[0].confidence > bestConf) {
      bestConf = r.predictions[0].confidence;
      bestName = name;
    }
  }

  // Model display order
  const order = ['lstm', 'liquid', 'simple_cnn', 'resnet18'];
  const displayNames = {lstm:'LSTM', liquid:'Liquid (LTC)', simple_cnn:'SimpleCNN', resnet18:'ResNet18'};

  let html = '';
  for (const name of order) {
    if (!data[name]) continue;
    const r = data[name];
    const type = r.type;
    const preds = r.predictions;
    const isBest = name === bestName;

    html += `<div class="model-card${isBest ? ' best' : ''}">`;
    html += `<div class="mc-header">`;
    html += `<span class="mc-name ${type}">${displayNames[name]}${isBest ? '<span class="best-label">BEST</span>' : ''}</span>`;
    html += `<span class="mc-badge ${type}">${type}</span>`;
    html += `</div>`;

    if (r.info && r.info.val_acc) {
      html += `<div class="mc-meta">Train acc: ${r.info.val_acc}% · ${r.info.params} params</div>`;
    }

    if (preds.length) {
      const top = preds[0];
      html += `<div class="mc-top">`;
      html += `<div class="mc-top-syl">${top.syllable}</div>`;
      html += `<div class="mc-top-conf ${type}">${top.confidence}%</div>`;
      html += `<div class="mc-top-class">Class #${top.class_id}</div>`;
      html += `</div>`;

      const maxC = top.confidence;
      for (let i = 1; i < Math.min(preds.length, 5); i++) {
        const p = preds[i];
        const w = maxC > 0 ? (p.confidence/maxC)*100 : 0;
        html += `<div class="mc-row">`;
        html += `<span class="mc-row-rank">${i+1}</span>`;
        html += `<span class="mc-row-syl">${p.syllable}</span>`;
        html += `<div class="mc-row-bar"><div class="mc-row-fill ${type}" style="width:${w}%"></div></div>`;
        html += `<span class="mc-row-conf">${p.confidence}%</span>`;
        html += `</div>`;
      }
    }

    html += `<div class="mc-footer">${r.inference_ms}ms inference</div>`;
    html += `</div>`;
  }

  el.innerHTML = html;
}

// ============================================================
// SYLLABLE REFERENCE
// ============================================================
async function loadSyl() {
  try {
    const r = await fetch('/syllables'); allSyl = await r.json(); renderSyl(allSyl);
  } catch(e) {}
}
function renderSyl(list) {
  document.getElementById('refCount').textContent = `${list.length} syllables`;
  const g = document.getElementById('sylGrid');
  g.innerHTML = '';
  const f = document.createDocumentFragment();
  list.forEach(s => {
    const c = document.createElement('div'); c.className = 'syl-cell';
    c.innerHTML = `<span class="syl-char">${s.syllable}</span><span class="syl-id">#${s.class_id}</span>`;
    f.appendChild(c);
  });
  g.appendChild(f);
}
function filter() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  renderSyl(q ? allSyl.filter(s => s.syllable.includes(q) || String(s.class_id).includes(q)) : allSyl);
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'Enter') recognizeAll();
  if (e.key === 'Escape') clearCanvas();
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
});

loadSyl();
</script>
</body>
</html>
